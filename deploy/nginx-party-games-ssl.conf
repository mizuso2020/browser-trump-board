server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  _;
    root         /usr/share/nginx/html;

    ssl_certificate     /etc/nginx/ssl/party-games.crt;
    ssl_certificate_key /etc/nginx/ssl/party-games.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/default.d/*.conf;

    error_page 404 /404.html;
    location = /404.html {
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
    }
}
