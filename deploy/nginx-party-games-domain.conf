server {
    listen       80;
    listen       [::]:80;
    server_name  browser-trump-board.com;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  browser-trump-board.com;
    root         /usr/share/nginx/html;

    ssl_certificate     /etc/letsencrypt/live/browser-trump-board.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/browser-trump-board.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/default.d/*.conf;

    error_page 404 /404.html;
    location = /404.html {
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
    }
}
